name: Tests unitaires

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  compilation:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.x'
      
      - name: Restore
        run: dotnet restore
      
      - name: Build
        run: dotnet build --configuration Release
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            **/bin/Release/
            **/obj/

  test:
    needs: compilation  # Attend que compilation soit finie
    runs-on: windows-latest
    permissions:
      contents: read
      checks: write
      actions: read
    
    strategy:
      matrix:
        test-group: [Addition, Soustraction, Multiplication, Division, Sin, Cos, Ln, Sqrt]
      fail-fast: false
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.x'
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
      
      - name: Test ${{ matrix.test-group }}
        run: dotnet test --no-build --filter "FullyQualifiedName~${{ matrix.test-group }}" --collect:"XPlat Code Coverage" --logger "trx;LogFileName=test-results-${{ matrix.test-group }}.trx" --results-directory:./TestResults/${{ matrix.test-group }}
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: test-results-${{ matrix.test-group }}
          path: ./TestResults/${{ matrix.test-group }}

  deploy:
    needs: test  # Attend que tous les tests soient passés
    runs-on: windows-latest
    if: success()  # Ne se lance que si tout est OK
    steps:
      - uses: actions/checkout@v4
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
      
      - name: validate
        run: |
          echo "✅ Tous les tests sont passés !"
          # Ici tu mets tes commandes de déploiement
          # Exemple: dotnet publish, copie vers serveur, etc.