name: Tests unitaires

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    permissions:
      contents: read
      checks: write
      actions: read
    
    strategy:
      matrix:
        test-group: [Addition, Soustraction, Multiplication, Division, Sin, Cos, Ln, Sqrt]
      fail-fast: false
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.x'
      
      - name: Restore
        run: dotnet restore
      
      - name: Build
        run: dotnet build --no-restore
      
      - name: Test ${{ matrix.test-group }}
        run: dotnet test --no-build --filter "FullyQualifiedName~${{ matrix.test-group }}" --verbosity normal